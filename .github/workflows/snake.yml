# snake.yml
# This is a GitHub Actions workflow. It runs on a schedule, looks at your
# real contribution graph, and generates an animated "snake" SVG that eats
# through it. GitHub hosts and updates the image for you automatically —
# you don't need to run anything yourself after this is set up once.

name: generate snake animation

on:
  schedule:
    # runs once a day at midnight UTC — feel free to leave this as-is
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # lets you manually trigger it from the Actions tab
  push:
    branches:
      - main             # regenerates whenever you push to main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Gateanjumfasiha
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
